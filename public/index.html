<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Emprendimiento Pro</title>
    <style>
        :root { --sidebar-bg: #eff6ff; --primary: #4f46e5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #f8fafc; }
        
        /* Barra lateral */
        .sidebar { width: 220px; height: 100vh; background: var(--sidebar-bg); padding: 20px; border-right: 1px solid #e0e7ff; }
        .sidebar h2 { font-size: 1.2em; color: var(--primary); }
        .menu-item { margin: 20px 0; cursor: pointer; color: #475569; }
        
        /* Contenido principal */
        .main { flex-grow: 1; padding: 20px; }
        .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .columna { background: white; padding: 15px; border-radius: 12px; min-height: 400px; border: 1px solid #e2e8f0; }
        
        /* Tarjetas */
        .card { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .date { font-size: 0.75em; color: #94a3b8; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>EmprendeBot</h2>
        <div class="menu-item">🏠 Tablero</div>
        <div class="menu-item">💡 Mis Ideas</div>
        <div class="menu-item">👤 Mentoría</div>
        <div class="menu-item">📁 Archivos</div>
    </div>

    <div class="main">
        <h1>Plataforma de Emprendimiento</h1>
        <form id="proyectoForm">
            <input type="text" id="titulo" placeholder="Nombre proyecto" required>
            <input type="text" id="autor" placeholder="Tu nombre" required>
            <button type="submit">Agregar</button>
        </form>

        <div class="kanban">
            <div class="columna" id="pendiente"><h3>⏳ Pendiente</h3></div>
            <div class="columna" id="proceso"><h3>⚙️ En Proceso</h3></div>
            <div class="columna" id="terminado"><h3>✅ Terminado</h3></div>
        </div>
    </div>

    <script>
        document.getElementById('proyectoForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { 
                titulo: document.getElementById('titulo').value, 
                autor: document.getElementById('autor').value,
                fecha: new Date().toLocaleDateString() // Nueva fecha automática
            };
            await fetch('/api/proyectos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            location.reload();
        };

        async function cargar() {
            const res = await fetch('/api/proyectos');
            const data = await res.json();
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>${p.titulo}</strong><p>👤 ${p.autor}</p><span class="date">${p.fecha || ''}</span>`;
                document.getElementById(p.estado || 'pendiente').appendChild(div);
            });
        }
        cargar();
    </script>
</body>
</html>
