<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Pro de Emprendimiento</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Contenedor del Formulario */
        .form-card { background: white; padding: 25px; border-radius: 15px; max-width: 500px; margin: 0 auto 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Tablero Kanban Profesional */
        .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .columna { background: #edf2f7; padding: 20px; border-radius: 12px; min-height: 400px; }
        .columna h3 { text-align: center; color: #4a5568; margin-bottom: 20px; }
        
        /* Tarjetas */
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h4 { margin: 0; color: #1e293b; }
        .card p { margin: 5px 0 0; font-size: 0.9em; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Plataforma de Emprendimiento</h1>
    </div>

    <div class="form-card">
        <form id="proyectoForm">
            <input type="text" id="titulo" placeholder="Nombre del proyecto" required>
            <input type="text" id="autor" placeholder="Autor" required>
            <button type="submit">Agregar al Tablero</button>
        </form>
    </div>

    <div class="kanban">
        <div class="columna" id="pendiente"><h3>⏳ Pendiente</h3></div>
        <div class="columna" id="proceso"><h3>⚙️ En Proceso</h3></div>
        <div class="columna" id="terminado"><h3>✅ Terminado</h3></div>
    </div>

    <script>
        document.getElementById('proyectoForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { titulo: document.getElementById('titulo').value, autor: document.getElementById('autor').value };
            await fetch('/api/proyectos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            location.reload(); 
        };

        async function cargar() {
            const res = await fetch('/api/proyectos');
            const data = await res.json();
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h4>${p.titulo}</h4><p>👤 ${p.autor}</p>`;
                document.getElementById(p.estado || 'pendiente').appendChild(div);
            });
        }
        cargar();
    </script>
</body>
</html>
