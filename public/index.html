<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Emprendimiento</title>
</head>
<body>
    <h1>Plataforma de Emprendimiento</h1>
    <form id="proyectoForm">
        <input type="text" id="titulo" placeholder="Nombre del proyecto" required>
        <input type="text" id="autor" placeholder="Tu nombre" required>
        <button type="submit">Agregar al Tablero</button>
    </form>

    <div style="display: flex; gap: 20px;">
        <div id="pendiente"><h3>Pendiente</h3></div>
        <div id="proceso"><h3>En Proceso</h3></div>
        <div id="terminado"><h3>Terminado</h3></div>
    </div>

    <script>
        document.getElementById('proyectoForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { titulo: document.getElementById('titulo').value, autor: document.getElementById('autor').value };
            await fetch('/api/proyectos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            location.reload(); 
        };
    </script>
</body>
</html>
