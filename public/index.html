<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma Emprendimiento Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --sidebar-bg: #f0f9ff; --primary: #0ea5e9; --bg-color: #f8fafc; --text-color: #0c4a6e; }
        body { font-family: sans-serif; display: flex; margin: 0; background: var(--bg-color); }
        .sidebar { width: 220px; height: 100vh; background: var(--sidebar-bg); padding: 20px; border-right: 2px solid #bae6fd; }
        .menu-item { margin: 25px 0; cursor: pointer; font-weight: 500; color: var(--text-color); }
        .main { flex-grow: 1; padding: 40px; }
        .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .columna { background: white; padding: 20px; border-radius: 16px; min-height: 400px; border: 2px solid #e0f2fe; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #bae6fd; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #e0f2fe; margin-bottom: 15px; cursor: grab; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>EmprendeBot</h2>
        <div class="menu-item">🏠 Tablero</div>
        <div class="menu-item">💡 Mis Ideas</div>
        <div class="menu-item">👤 Mentoría</div>
        <div class="menu-item">📁 Archivos</div>
    </div>
    <div class="main">
        <h1>Plataforma de Emprendimiento</h1>
        <form id="proyectoForm">
            <input type="text" id="titulo" placeholder="Nombre proyecto" required>
            <input type="text" id="autor" placeholder="Tu nombre" required>
            <label style="font-size: 0.8em;">Subir archivo (Proximamente):</label>
            <input type="file" id="archivo">
            <button type="submit">Agregar al Tablero</button>
        </form>
        <div class="kanban">
            <div id="vistaArchivos" style="display: none;">
            <h1>📁 Mis Archivos</h1>
            <div id="listaArchivos"></div>
        </div>
            <div class="columna" id="pendiente"><h3>⏳ Pendiente</h3></div>
            <div class="columna" id="proceso"><h3>⚙️ En Proceso</h3></div>
            <div class="columna" id="terminado"><h3>✅ Terminado</h3></div>
        </div>
    </div>
    <script>
        document.getElementById('proyectoForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { 
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                fecha: new Date().toLocaleDateString()
            };
            // Enviamos el proyecto (el archivo queda registrado en el input para futura integración)
            await fetch('/api/proyectos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            location.reload();
        };
        async function cargar() {
            const res = await fetch('/api/proyectos');
            const data = await res.json();
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<strong>${p.titulo}</strong><p>👤 ${p.autor}</p>`;
                document.getElementById(p.estado || 'pendiente').appendChild(div);
            });
            ['pendiente', 'proceso', 'terminado'].forEach(id => new Sortable(document.getElementById(id), { group: 'shared' }));
        }
        cargar();
    </script>
</body>
</html>
