<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Emprendimiento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚀 Panel de Seguimiento de Emprendimiento</h1>
    </header>

    <div class="container">
        <!-- SECCIÓN REPOSITORIO -->
        <section class="card">
            <h2>📁 Repositorio de Archivos</h2>
            <input type="text" id="archivoNombre" placeholder="Nombre del archivo (ej. Plan_Final.pdf)">
            <button onclick="subirArchivo()">Subir Documento</button>
            <ul id="listaArchivos"></ul>
        </section>

        <!-- SECCIÓN MENTORÍAS -->
        <section class="card">
            <h2>🤝 Programa de Mentoría (Feedback Presencial)</h2>
            <textarea id="feedbackTexto" placeholder="Escribe la retroalimentación de la sesión presencial..."></textarea>
            <button onclick="guardarMentoria()">Registrar Asesoría (Marca Temporal)</button>
            <div id="historialMentorias"></div>
        </section>
    </div>

    <!-- SECCIÓN KANBAN -->
    <h2 style="text-align: center; margin-top: 20px;">📋 Tablero Kanban</h2>
    <div class="kanban-input">
        <input type="text" id="nuevaTarea" placeholder="Nueva tarea de emprendimiento...">
        <button onclick="agregarTarea()">Agregar al Kanban</button>
    </div>
    
    <div class="kanban-board">
        <div class="column" id="pendiente">
            <h3>🔴 Pendiente</h3>
            <div class="tasks" id="tasks-pendiente"></div>
        </div>
        <div class="column" id="proceso">
            <h3>🟡 En Proceso</h3>
            <div class="tasks" id="tasks-proceso"></div>
        </div>
        <div class="column" id="terminado">
            <h3>🟢 Terminado</h3>
            <div class="tasks" id="tasks-terminado"></div>
        </div>
    </div>

    <script>
        // Lógica para comunicarse con el servidor Backend
        async function cargarTodo() {
            cargarKanban();
            cargarMentorias();
            cargarArchivos();
        }

        // --- LÓGICA KANBAN ---
        async function cargarKanban() {
            const res = await fetch('/api/tareas');
            const tareas = await res.json();
            ['pendiente', 'proceso', 'terminado'].forEach(est => document.getElementById(`tasks-${est}`).innerHTML = '');
            
            tareas.forEach(t => {
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<p>${t.texto}</p>`;
                
                if(t.estado !== 'terminado') {
                    const proxEstado = t.estado === 'pendiente' ? 'proceso' : 'terminado';
                    div.innerHTML += `<button onclick="moverTarea(${t.id}, '${proxEstado}')">Avanzar ➡️</button>`;
                }
                document.getElementById(`tasks-${t.estado}`).appendChild(div);
            });
        }

        async function agregarTarea() {
            const texto = document.getElementById('nuevaTarea').value;
            if(!texto) return;
            await fetch('/api/tareas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ texto })
            });
            document.getElementById('nuevaTarea').value = '';
            cargarKanban();
        }

        async function moverTarea(id, nuevoEstado) {
            await fetch(`/api/tareas/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ estado: nuevoEstado })
            });
            cargarKanban();
        }

        // --- LÓGICA MENTORÍAS ---
        async function cargarMentorias() {
            const res = await fetch('/api/mentorias');
            const lista = await res.json();
            const contenedor = document.getElementById('historialMentorias');
            contenedor.innerHTML = lista.map(m => `
                <div class="mentoria-item">
                    <small>📅 ${m.fecha}</small>
                    <p>${m.feedback}</p>
                </div>
            `).join('');
        }

        async function guardarMentoria() {
            const feedback = document.getElementById('feedbackTexto').value;
            if(!feedback) return;
            await fetch('/api/mentorias', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ feedback })
            });
            document.getElementById('feedbackTexto').value = '';
            cargarMentorias();
        }

        // --- LÓGICA ARCHIVOS ---
        async function cargarArchivos() {
            const res = await fetch('/api/archivos');
            const lista = await res.json();
            document.getElementById('listaArchivos').innerHTML = lista.map(a => `<li>📄 ${a}</li>`).join('');
        }

        async function subirArchivo() {
            const nombre = document.getElementById('archivoNombre').value;
            if(!nombre) return;
            await fetch('/api/archivos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombreArchivo: nombre })
            });
            document.getElementById('archivoNombre').value = '';
            cargarArchivos();
        }

        window.onload = cargarTodo;
    </script>
</body>
</html>
